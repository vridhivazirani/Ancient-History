<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" style="background:transparent;">
  <!-- Ancient Greece Sketch Map -->
  <path d="M50,50 L80,40 L120,60 L150,120 L130,180 L80,220 L40,180 Z" fill="#f4ece1" stroke="#5d4037" stroke-width="1" opacity="0.3"/>
  <circle cx="200" cy="150" r="2" fill="#5d4037" opacity="0.2"/>
  <circle cx="220" cy="180" r="2" fill="#5d4037" opacity="0.2"/>
  <circle cx="250" cy="130" r="2" fill="#5d4037" opacity="0.2"/>
  <text x="60" y="80" font-family="Cinzel" font-size="14" fill="#5d4037" font-weight="bold">Macedonia</text>
  <text x="90" y="150" font-family="Cinzel" font-size="14" fill="#5d4037" font-weight="bold">Attica</text>
  <text x="60" y="240" font-family="Cinzel" font-size="14" fill="#5d4037" font-weight="bold">Peloponnese</text>
  <!-- Cities -->
  <circle cx="120" cy="160" r="3" fill="#0047ab"/>
  <text x="125" y="160" font-family="Spectral" font-size="10" fill="#5d4037">Athens</text>
  <circle cx="70" cy="210" r="3" fill="#0047ab"/>
  <text x="75" y="210" font-family="Spectral" font-size="10" fill="#5d4037">Sparta</text>
  <circle cx="110" cy="110" r="2" fill="#5d4037"/>
  <text x="115" y="110" font-family="Spectral" font-size="8" fill="#5d4037">Thebes</text>
  <text x="220" y="100" font-family="Cinzel" font-size="12" fill="#5d4037" font-style="italic">Aegean Sea</text>
</svg>
